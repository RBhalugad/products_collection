name: Run Postman Collection

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  run-postman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - List files
        run: |
          pwd
          ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Newman + HTML Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Verify Postman files exist
        run: |
          [ -f Products.postman_collection.json ] || (echo "Missing Products.postman_collection.json" && exit 1)
          [ -f product_data.json ] || (echo "Missing product_data.json" && exit 1)
          [ -f OnlineStoreAPI.postman_globals.json ] || (echo "Missing OnlineStoreAPI.postman_globals.json" && exit 1)
          echo "All required files found"

      - name: Run Postman Collection
        run: |
          newman run Products.postman_collection.json \
          -d product_data.json \
          -g OnlineStoreAPI.postman_globals.json \
          -r htmlextra 

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: report.html
